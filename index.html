<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本全国食べ記録</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; background: #f5f5f0; min-height: 100vh; }
#header { background: #fff; border-bottom: 1px solid #e0e0d8; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
#header h1 { font-size: 16px; font-weight: 600; color: #1a1a1a; }
#stats { font-size: 12px; color: #666; margin-left: auto; }
#main { display: flex; flex-direction: column; align-items: center; padding: 12px; }
#map-wrap { width: 100%; max-width: 500px; background: #e8f4fd; border-radius: 12px; overflow: hidden; padding: 8px; }
svg#map { width: 100%; height: auto; display: block; }
.pref { fill: #fff; stroke: #aaa; stroke-width: 0.6; cursor: pointer; transition: filter 0.15s; }
.pref:hover { filter: brightness(0.88); stroke: #555; stroke-width: 1; }
#legend { display: flex; gap: 6px; align-items: center; margin: 10px 0; flex-wrap: wrap; justify-content: center; }
.leg { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; }
.leg-box { width: 14px; height: 14px; border: 1px solid #ccc; border-radius: 2px; }
/* Modal */
#overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; justify-content: center; }
#overlay.open { display: flex; }
@media(min-width: 600px) { #overlay { align-items: center; } }
#modal { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; padding: 20px; }
@media(min-width: 600px) { #modal { border-radius: 16px; } }
#modal-name { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #1a1a1a; }
.form-row { margin-bottom: 12px; }
.form-row label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
.form-row input, .form-row textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; background: #fafafa; }
.form-row textarea { min-height: 70px; resize: vertical; }
.btn-row { display: flex; gap: 8px; margin-top: 14px; }
.btn { padding: 10px 20px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; cursor: pointer; font-family: inherit; }
.btn-save { background: #2d8a45; color: #fff; border-color: #2d8a45; font-weight: 500; }
.btn-save:hover { background: #246e38; }
.btn-close { background: #fff; color: #444; }
.btn-close:hover { background: #f0f0ea; }
#records { margin-top: 16px; border-top: 1px solid #eee; padding-top: 14px; }
.rec-head { font-size: 12px; color: #888; margin-bottom: 8px; }
.rec-item { background: #f8f8f4; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; position: relative; }
.rec-date { font-size: 12px; color: #888; }
.rec-food { font-size: 14px; color: #1a1a1a; margin-top: 2px; }
.rec-del { position: absolute; top: 8px; right: 8px; background: none; border: none; cursor: pointer; font-size: 18px; color: #ccc; line-height: 1; padding: 2px 4px; }
.rec-del:hover { color: #c0392b; }
#tooltip { position: fixed; background: rgba(0,0,0,0.75); color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 12px; pointer-events: none; display: none; z-index: 50; }
</style>
</head>

</div>

const STORAGE_KEY = "japan_food_v2";
let db = {};
let curId = null;

function load() {
  try { db = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch(e) { db = {}; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }

function getColor(n) {
  if (n === 0) return "#ffffff";
  if (n <= 2) return "#d4edda";
  if (n <= 5) return "#a8d5b5";
  if (n <= 9) return "#6db87f";
  return "#2d8a45";
}

function buildMap() {
  const svg = document.getElementById("map");
  // 都道府県IDごとにパスをグループ化（47番目も46=沖縄）
  const byId = {};
  PREF_PATHS.forEach(p => {
    if (!byId[p.id]) byId[p.id] = { name: p.name, paths: [] };
    byId[p.id].paths.push(p.d);
  });

  Object.entries(byId).forEach(([id, info]) => {
    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.setAttribute("data-id", id);
    g.setAttribute("data-name", info.name);
    info.paths.forEach(d => {
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", d);
      path.classList.add("pref");
      path.setAttribute("id", "p" + id);
      g.appendChild(path);
    });
    g.addEventListener("click", () => openModal(parseInt(id), info.name));
    g.addEventListener("mousemove", (e) => showTip(e, info.name, parseInt(id)));
    g.addEventListener("mouseleave", hideTip);
    svg.appendChild(g);
  });
  updateColors();
}

function updateColors() {
  let visited = 0, total = 0;
  for (let id = 1; id <= 46; id++) {
    const recs = db[id] || [];
    const n = recs.length;
    if (n > 0) visited++;
    total += n;
    document.querySelectorAll("#p" + id).forEach(el => el.style.fill = getColor(n));
  }
  document.getElementById("v-cnt").textContent = visited;
  document.getElementById("t-cnt").textContent = total;
}

const DAYS = ["日","月","火","水","木","金","土"];
function formatDate(s) {
  const [y,m,d] = s.split("-").map(Number);
  return y + "/" + String(m).padStart(2,"0") + "/" + String(d).padStart(2,"0") + "（" + DAYS[new Date(y,m-1,d).getDay()] + "）";
}

function openModal(id, name) {
  curId = id;
  document.getElementById("modal-name").textContent = name;
  const today = new Date();
  const y = today.getFullYear();
  const m = String(today.getMonth()+1).padStart(2,"0");
  const d = String(today.getDate()).padStart(2,"0");
  document.getElementById("inp-date").value = y + "/" + m + "/" + d;
  document.getElementById("inp-food").value = "";
  renderRecords();
  document.getElementById("overlay").classList.add("open");
}
function closeModal() { document.getElementById("overlay").classList.remove("open"); }

function renderRecords() {
  const recs = db[curId] || [];
  const el = document.getElementById("records");
  if (!recs.length) { el.innerHTML = ""; return; }
  el.innerHTML = "<div class='rec-head'>過去の記録（" + recs.length + "件）</div>" +
    recs.map((r,i) => "<div class='rec-item'>" +
      "<div class='rec-date'>" + formatDate(r.date) + "</div>" +
      "<div class='rec-food'>" + r.food + "</div>" +
      "<button class='rec-del' onclick='delRecord(" + i + ")'>×</button>" +
      "</div>").join("");
}

function saveRecord() {
  const date = document.getElementById("inp-date").value;
  const food = document.getElementById("inp-food").value.trim();
  if (!date || !food) { alert("訪問日と食べたものを入力してください"); return; }
  if (!db[curId]) db[curId] = [];
  db[curId].push({ date, food });
  save(); updateColors(); renderRecords();
  document.getElementById("inp-food").value = "";
}

function delRecord(i) {
  db[curId].splice(i, 1);
  if (!db[curId].length) delete db[curId];
  save(); updateColors(); renderRecords();
}

const tip = document.getElementById("tooltip");
function showTip(e, name, id) {
  const n = (db[id] || []).length;
  tip.textContent = name + "（" + n + "回）";
  tip.style.display = "block";
  tip.style.left = (e.clientX + 14) + "px";
  tip.style.top = (e.clientY - 30) + "px";
}
function hideTip() { tip.style.display = "none"; }

document.getElementById("overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("overlay")) closeModal();
});

load();
buildMap();
</script>
